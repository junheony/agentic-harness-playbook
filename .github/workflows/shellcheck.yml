name: shellcheck

on:
  push:
    paths:
      - 'scripts/**/*.sh'
      - 'examples/hooks/*.sh'
      - 'examples/routines/*.sh.example'
      - '.github/workflows/shellcheck.yml'
  pull_request:
    paths:
      - 'scripts/**/*.sh'
      - 'examples/hooks/*.sh'
      - 'examples/routines/*.sh.example'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck (scripts/)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          severity: warning
          additional_files: |
            scripts/*.sh
      - name: Run shellcheck (examples/hooks/)
        run: |
          shopt -s nullglob
          files=(examples/hooks/*.sh)
          if (( ${#files[@]} > 0 )); then
            shellcheck -S warning "${files[@]}"
          fi
      - name: Syntax check (examples/routines/*.sh.example)
        run: |
          # .example 파일은 <placeholder> 치환 전 템플릿이므로 shellcheck 대신
          # bash -n 문법 검사만 수행한다.
          shopt -s nullglob
          for f in examples/routines/*.sh.example; do
            bash -n "$f"
          done
