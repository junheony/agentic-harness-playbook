name: router-tests

on:
  push:
    paths:
      - 'scripts/test-router.sh'
      - 'scripts/test_cases.txt'
      - 'skills/router/SKILL.md'
      - 'mini-router/**'
      - '.github/workflows/router-tests.yml'
  pull_request:
    paths:
      - 'scripts/test-router.sh'
      - 'scripts/test_cases.txt'
      - 'skills/router/SKILL.md'
      - 'mini-router/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run router unit tests
        run: bash scripts/test-router.sh

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Compile + unit test mini-router (stdlib only, no pip installs)
        run: |
          python -m py_compile mini-router/bot.py
          python -m unittest discover -s mini-router/tests -v
